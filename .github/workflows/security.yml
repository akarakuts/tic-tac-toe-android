# OSV dependency scan + CodeQL on pushes and PRs to main (scheduled weekly).
# OSV still uploads SARIF to Code Scanning; fail-on-vuln=false avoids failing CI on known CVE noise.
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"

jobs:
  osv:
    name: OSV dependency scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      fail-on-vuln: false
      scan-args: |-
        --recursive
        ./

  codeql:
    name: CodeQL (Kotlin/Java)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build debug (tracing for CodeQL)
        run: chmod +x ./gradlew && ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
